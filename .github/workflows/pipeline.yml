name: Flight & Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process raw flight data
        run: python ingestion/fetch_flight.py

      - name: Process raw weather data
        run: python ingestion/fetch_weather.py

      - name: Load data to BigQuery
        run: python ingestion/load_to_bigquery.py

      - name: Install dbt dependencies
        run: pip install dbt-bigquery

      - name: Run dbt models and tests
        working-directory: dbt_projects
        run: |
          dbt deps
          dbt run
          dbt test